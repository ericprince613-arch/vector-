<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      margin: 0;
      padding: 0;
      color: #333;
    }
    header {
      text-align: center;
      padding: 40px;
      background: #fff;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    header h1 {
      animation: flyIn 2s ease-out;
    }
    @keyframes flyIn {
      from { transform: translateY(-100px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .profile {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 40px;
      gap: 30px;
    }
    .profile img {
      width: 200px;
      height: 250px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    .info {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      animation: flyIn 2s ease-out;
    }
    .info h2 {
      margin-top: 0;
      color: #0077b6;
    }
    footer {
      text-align: center;
      padding: 20px;
      background: #0077b6;
      color: #fff;
    }
  </style>
</head>
<body>
  <header>
    <h1>Welcome to My Website</h1>
  </header>

  <section class="profile">
    <!-- Replace with actual passport photo -->
    <img src="passport.jpg" alt="Passport Photo">
    <div class="info">
      <h2>About Myself</h2>
      <p><strong>Name:</strong> [Prince eric]</p>
      <p><strong>Age:</strong> 18 years old</p>
      <p><strong>University:</strong> Abia State University Nigeria</p>
      <p><strong>Course:</strong> English language and literature</p>
      <p><strong>Location:</strong> Delta State, Nigeria</p>
    </div>
  </section>

  <footer>
    <p>Made with ❤️ using HTML, CSS, and JavaScript</p>
  </footer>

  <script>
    // Example JavaScript animation effect
    document.addEventListener("DOMContentLoaded", () => {
      const infoBox = document.querySelector(".info");
      infoBox.addEventListener("mouseover", () => {
        infoBox.style.transform = "scale(1.05)";
        infoBox.style.transition = "transform 0.3s ease";
      });
      infoBox.addEventListener("mouseout", () => {
        infoBox.style.transform = "scale(1)";
      });
    });
  </script>
</body>
</html>
